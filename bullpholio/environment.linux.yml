# =========================
# environment.linux.yml
# =========================
name: bullpholio-ocr

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip>=24.0

  # core data stack
  - numpy>=1.26
  - pandas>=2.1
  - openpyxl>=3.1

  # image / OCR support
  - pillow>=10
  - scikit-image>=0.22
  - matplotlib>=3.8

  # system OCR dependency (kept for any future Tesseract fallback)
  - tesseract

  - pip:
      - pymupdf>=1.24
      - pdfplumber>=0.11
      - python-docx>=1.1
      - paddlepaddle>=2.6.0
      - paddleocr>=2.7.0
      - opencv-python-headless>=4.9
      - pydantic>=2.6
      - python-dotenv>=1.0
